<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Terminal | BridgeHope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b1626] text-white min-h-screen flex items-center justify-center p-6">

    <main class="w-full max-w-lg">
        <a href="/index.html" class="text-slate-500 hover:text-blue-400 transition-colors uppercase tracking-widest text-xs mb-8 block">← RETURN TO BASE</a>
        
        <div class="bg-[#122640] p-10 rounded-3xl border border-slate-700 shadow-2xl">
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight">SECURE CHANNEL</h1>
            <p class="text-slate-400 mb-8 text-sm uppercase tracking-wider">Establish direct communication with Command.</p>
            
            <form id="contactForm" class="space-y-4">
                <input type="text" placeholder="NAME" required class="w-full p-4 bg-[#0b1626] border border-slate-700 rounded-xl focus:border-blue-500 outline-none transition-all placeholder-slate-500">
                <input type="email" placeholder="EMAIL" required class="w-full p-4 bg-[#0b1626] border border-slate-700 rounded-xl focus:border-blue-500 outline-none transition-all placeholder-slate-500">
                <input type="text" placeholder="SUBJECT" required class="w-full p-4 bg-[#0b1626] border border-slate-700 rounded-xl focus:border-blue-500 outline-none transition-all placeholder-slate-500">
                <textarea placeholder="MESSAGE" rows="4" required class="w-full p-4 bg-[#0b1626] border border-slate-700 rounded-xl focus:border-blue-500 outline-none transition-all placeholder-slate-500"></textarea>
                
                <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold uppercase tracking-widest transition-all shadow-lg hover:shadow-blue-900/50">
                    Send Transmission
                </button>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="modal" class="fixed inset-0 bg-[#0b1626]/90 hidden items-center justify-center backdrop-blur-md z-50 p-6">
        <div class="bg-[#122640] border border-slate-700 p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h3 class="text-green-400 font-bold text-xl mb-2 tracking-widest">CONNECTION ESTABLISHED</h3>
            <p class="text-slate-400 text-xs mb-8 uppercase">Choose your communication node:</p>
            
            <div class="space-y-3">
                <a href="https://wa.me/+2348105377296" class="block w-full py-3 bg-[#25D366] hover:bg-green-600 rounded-xl font-bold transition">WHATSAPP</a>
                <a href="mailto:bridgehopefoundationfcd@gmail.com" class="block w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold transition">EMAIL</a>
            </div>
            <p id="timer" class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest">Auto-routing in 6s...</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        
        form.onsubmit = (e) => {
            e.preventDefault();
            btn.innerText = "UPLOADING...";
            btn.disabled = true;
            
            setTimeout(() => {
                document.getElementById('modal').style.display = 'flex';
                let timeLeft = 6;
                const timer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timer').innerText = `AUTO-ROUTING IN ${timeLeft}s...`;
                    if(timeLeft <= 0) {
                        clearInterval(timer);
                        window.location.href = 'https://wa.me/YOUR_NUMBER';
                    }
                }, 1000);
            }, 2000);
        };
    </script>
</body>
</html>
